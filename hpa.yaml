apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler

metadata:
  name: transaction-hpa
  namespace: bank-app

spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: transaction-service

  minReplicas: 1
  maxReplicas: 2

  metrics:
  - type: Resource

    resource:
      name: cpu

      target:
        type: Utilization
        averageUtilization: 70
