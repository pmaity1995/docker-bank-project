apiVersion: apps/v1
kind: Deployment

metadata:
  name: notification-service
  namespace: bank-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: notification-service

  template:
    metadata:
      labels:
        app: notification-service

    spec:

      tolerations:
      - key: "notification"
        operator: "Equal"
        value: "true"
        effect: "NoSchedule"

      containers:
      - name: notification-service

        image: barney1995/notification-service:v1

        ports:
        - containerPort: 5000
